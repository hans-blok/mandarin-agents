context_budget:
  enabled: true
  warn_threshold: 0.80
  critical_threshold: 0.95
  block_on_critical: false
  default_measurement_mode: schatting

  providers:
    anthropic:
      supports_exact_usage: true
      supports_hard_context_loss_signal: false
    openai:
      supports_exact_usage: true
      supports_hard_context_loss_signal: false

  models:
    claude-sonnet-4-6:
      context_window_tokens: 200000
      provider: anthropic
    claude-opus-4-7:
      context_window_tokens: 200000
      provider: anthropic
    claude-haiku-4-5:
      context_window_tokens: 200000
      provider: anthropic
    gpt-4o:
      context_window_tokens: 128000
      provider: openai
    gpt-4o-mini:
      context_window_tokens: 128000
      provider: openai
